<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #16161f;
  --bg4: #1c1c28;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --accent: #6d28d9;
  --accent2: #7c3aed;
  --accent3: #8b5cf6;
  --glow: rgba(109,40,217,0.4);
  --text: #f0f0f8;
  --text2: #9090b0;
  --text3: #5a5a7a;
  --online: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
  --radius: 16px;
  --radius-sm: 8px;
  --radius-msg: 20px;
  --trans: all 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ── AUTH SCREEN ── */
#auth-screen {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  overflow: hidden;
}

.auth-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 80% at 50% -20%, rgba(109,40,217,0.3), transparent),
              radial-gradient(ellipse 60% 60% at 80% 80%, rgba(219,39,119,0.15), transparent);
  animation: bgPulse 8s ease-in-out infinite alternate;
}

@keyframes bgPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

.auth-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(60px); }
}

.auth-box {
  position: relative; z-index: 1;
  width: 420px;
  background: rgba(17,17,24,0.85);
  backdrop-filter: blur(40px);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 0 80px rgba(109,40,217,0.2), 0 0 0 1px rgba(109,40,217,0.1);
  animation: authIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes authIn {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.auth-logo {
  text-align: center; margin-bottom: 32px;
}

.auth-logo .logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), #db2777);
  border-radius: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px;
  margin-bottom: 12px;
  box-shadow: 0 0 30px var(--glow);
  animation: logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-4px) rotate(2deg); }
}

.auth-logo h1 {
  font-family: 'Syne', sans-serif;
  font-size: 28px; font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(90deg, #a78bfa, #f0abfc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.auth-logo p { color: var(--text2); font-size: 13px; margin-top: 4px; }

.auth-tabs {
  display: flex; gap: 4px;
  background: var(--bg3); border-radius: var(--radius-sm); padding: 4px;
  margin-bottom: 28px;
}

.auth-tab {
  flex: 1; padding: 10px;
  border: none; background: transparent;
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 500;
  border-radius: 6px; cursor: pointer;
  transition: var(--trans);
}

.auth-tab.active {
  background: var(--accent2);
  color: white;
  box-shadow: 0 0 20px rgba(124,58,237,0.4);
}

.form-group { margin-bottom: 16px; }

.form-group label {
  display: block; font-size: 12px; font-weight: 500;
  color: var(--text2); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.form-group input {
  width: 100%; padding: 12px 16px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  transition: var(--trans); outline: none;
}

.form-group input:focus {
  border-color: var(--accent3);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
  background: var(--bg4);
}

.form-group input::placeholder { color: var(--text3); }

.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--radius-sm);
  color: white; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer; transition: var(--trans);
  position: relative; overflow: hidden;
  box-shadow: 0 4px 20px rgba(109,40,217,0.4);
  margin-top: 8px;
}

.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transform: translateX(-100%);
  transition: transform 0.5s;
}

.btn-primary:hover::after { transform: translateX(100%); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(109,40,217,0.6); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.auth-error {
  padding: 10px 14px; background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm); color: #fca5a5;
  font-size: 13px; margin-top: 12px;
  display: none;
}

/* ── MAIN APP ── */
#app {
  display: none;
  height: 100vh;
  flex-direction: row;
}

#app.visible { display: flex; }

/* ── SIDEBAR ── */
.sidebar {
  width: 320px; min-width: 320px;
  height: 100%;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: relative;
}

.sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}

.sidebar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 20px;
  background: linear-gradient(90deg, #a78bfa, #f0abfc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.sidebar-actions { margin-left: auto; display: flex; gap: 8px; }

.icon-btn {
  width: 36px; height: 36px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 10px; color: var(--text2);
  cursor: pointer; transition: var(--trans);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.icon-btn:hover { background: var(--bg4); border-color: var(--border2); color: var(--text); }

.search-wrap { padding: 12px 16px; }

.search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  outline: none; transition: var(--trans);
  position: relative;
}

.search-wrap { position: relative; }
.search-wrap .s-icon {
  position: absolute; left: 28px; top: 50%;
  transform: translateY(-50%); color: var(--text3); pointer-events: none;
}

.search-input:focus {
  border-color: var(--accent3);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
}

/* SEARCH RESULTS */
#search-results {
  position: absolute; top: 100%; left: 16px; right: 16px; z-index: 100;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: none;
}

#search-results.visible { display: block; animation: dropIn 0.15s ease; }

@keyframes dropIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.search-result-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; cursor: pointer;
  transition: var(--trans);
}

.search-result-item:hover { background: var(--bg4); }

/* CHAT LIST */
.chat-list { flex: 1; overflow-y: auto; padding: 8px 8px; }

.chat-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: var(--radius);
  cursor: pointer; transition: var(--trans);
  position: relative;
}

.chat-item:hover { background: var(--bg3); }
.chat-item.active { background: rgba(109,40,217,0.15); }
.chat-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 60%; background: var(--accent3);
  border-radius: 0 3px 3px 0;
}

.avatar {
  width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  position: relative; user-select: none;
}

.avatar .online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 11px; height: 11px;
  background: var(--online); border-radius: 50%;
  border: 2px solid var(--bg2);
  display: none;
}

.avatar.online .online-dot { display: block; }

.chat-info { flex: 1; min-width: 0; }
.chat-name { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
.chat-preview { color: var(--text2); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.chat-meta { text-align: right; }
.chat-time { font-size: 11px; color: var(--text3); margin-bottom: 4px; }

.unread-badge {
  background: var(--accent2); color: white;
  font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  min-width: 20px; text-align: center;
}

/* ── PROFILE SIDEBAR (bottom) ── */
.profile-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: var(--trans);
}

.profile-bar:hover { background: var(--bg3); }

.profile-bar .pname { font-weight: 600; font-size: 14px; }
.profile-bar .puname { font-size: 12px; color: var(--text2); }
.profile-bar .pset { margin-left: auto; color: var(--text3); font-size: 18px; }

/* ── MAIN AREA ── */
.main {
  flex: 1; height: 100%;
  display: flex; flex-direction: column;
  background: var(--bg);
  position: relative;
}

/* ── EMPTY STATE ── */
.empty-state {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  color: var(--text3);
}

.empty-state .e-icon {
  width: 80px; height: 80px;
  background: var(--bg3); border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  animation: emptyPulse 2s ease-in-out infinite;
}

@keyframes emptyPulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(109,40,217,0); }
  50% { transform: scale(1.03); box-shadow: 0 0 0 12px rgba(109,40,217,0); }
}

.empty-state h3 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--text2); }
.empty-state p { font-size: 14px; max-width: 280px; text-align: center; }

/* ── CHAT HEADER ── */
.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
  backdrop-filter: blur(10px);
  background: rgba(10,10,15,0.8);
  position: relative; z-index: 10;
}

.chat-header-info h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
.chat-header-info .status { font-size: 12px; color: var(--text2); }
.chat-header-info .status.online { color: var(--online); }

.chat-header-actions { margin-left: auto; display: flex; gap: 8px; }

/* ── MESSAGES ── */
.messages-wrap {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column;
  gap: 2px;
}

.date-divider {
  text-align: center; padding: 12px 0;
  font-size: 12px; color: var(--text3);
  position: relative;
}

.date-divider::before {
  content: ''; position: absolute; left: 0; right: 0; top: 50%;
  height: 1px; background: var(--border);
}

.date-divider span {
  position: relative; background: var(--bg);
  padding: 0 12px;
}

.message-row {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 2px 0;
  animation: msgIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.message-row.own { flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  margin-bottom: 2px;
}

.message-group { max-width: 65%; }

.message-bubble {
  padding: 10px 14px;
  border-radius: var(--radius-msg);
  position: relative;
  word-break: break-word;
  line-height: 1.5;
  font-size: 14px;
}

.message-row:not(.own) .message-bubble {
  background: var(--bg3);
  border-bottom-left-radius: 4px;
  color: var(--text);
}

.message-row.own .message-bubble {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-bottom-right-radius: 4px;
  color: white;
}

.message-row:not(.own) .message-bubble:first-child { border-top-left-radius: var(--radius-msg); }
.message-row.own .message-bubble:first-child { border-top-right-radius: var(--radius-msg); }

.msg-sender {
  font-size: 11px; font-weight: 600; color: var(--accent3);
  margin-bottom: 3px; padding: 0 2px;
}

.msg-meta {
  display: flex; align-items: center; gap: 4px; justify-content: flex-end;
  margin-top: 4px; opacity: 0.6; font-size: 11px;
}

.message-row.own .msg-meta { color: rgba(255,255,255,0.8); }

.msg-edited { font-size: 11px; }

/* Reply */
.reply-preview {
  padding: 6px 10px; margin-bottom: 6px;
  background: rgba(255,255,255,0.06);
  border-left: 2px solid var(--accent3);
  border-radius: 8px; font-size: 12px; color: var(--text2);
}

.message-row.own .reply-preview { background: rgba(0,0,0,0.15); }

/* Reactions */
.msg-reactions {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-top: 4px;
}

.reaction-chip {
  background: var(--bg4); border: 1px solid var(--border);
  border-radius: 99px; padding: 2px 8px;
  font-size: 12px; cursor: pointer;
  transition: var(--trans); user-select: none;
  display: flex; align-items: center; gap: 4px;
}

.reaction-chip:hover { background: var(--bg3); border-color: var(--accent3); }
.reaction-chip.mine { background: rgba(109,40,217,0.2); border-color: var(--accent3); }

.reaction-count { font-size: 11px; color: var(--text2); }

/* Context menu */
.msg-ctx {
  position: absolute; right: -8px; top: 50%;
  transform: translateY(-50%);
  opacity: 0; pointer-events: none;
  display: flex; gap: 2px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 10px; padding: 4px;
  transition: var(--trans);
  z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.message-row.own .msg-ctx { right: auto; left: -8px; }

.message-bubble:hover .msg-ctx { opacity: 1; pointer-events: all; }

.ctx-btn {
  width: 28px; height: 28px; border-radius: 6px;
  background: transparent; border: none;
  color: var(--text2); cursor: pointer;
  transition: var(--trans); display: flex;
  align-items: center; justify-content: center;
  font-size: 14px;
}

.ctx-btn:hover { background: var(--bg4); color: var(--text); }

/* Typing indicator */
.typing-indicator {
  padding: 4px 20px; font-size: 12px; color: var(--text3);
  min-height: 24px;
  display: flex; align-items: center; gap: 8px;
}

.typing-dots span {
  display: inline-block; width: 5px; height: 5px;
  background: var(--text3); border-radius: 50%;
  animation: typingDot 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingDot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* ── INPUT AREA ── */
.input-area {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(10px);
}

/* Reply bar */
.reply-bar {
  display: none;
  align-items: center; gap: 10px;
  padding: 8px 12px; margin-bottom: 10px;
  background: var(--bg3); border-radius: var(--radius-sm);
  border-left: 2px solid var(--accent3);
}

.reply-bar.visible { display: flex; }
.reply-bar .r-txt { flex: 1; font-size: 12px; color: var(--text2); }
.reply-bar .r-close { cursor: pointer; color: var(--text3); transition: var(--trans); }
.reply-bar .r-close:hover { color: var(--danger); }

.input-row {
  display: flex; align-items: flex-end; gap: 10px;
}

.input-box {
  flex: 1; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 16px; padding: 12px 16px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none; resize: none;
  min-height: 44px; max-height: 120px;
  transition: var(--trans); line-height: 1.5;
}

.input-box:focus {
  border-color: var(--accent3);
  box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
}

.input-box::placeholder { color: var(--text3); }

.send-btn {
  width: 44px; height: 44px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 14px;
  color: white; cursor: pointer;
  transition: var(--trans); display: flex;
  align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 16px rgba(109,40,217,0.4);
}

.send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(109,40,217,0.6); }
.send-btn:active { transform: scale(0.95); }

.emoji-btn {
  width: 44px; height: 44px;
  background: transparent; border: 1px solid var(--border);
  border-radius: 14px; color: var(--text2);
  cursor: pointer; font-size: 20px;
  transition: var(--trans); display: flex;
  align-items: center; justify-content: center;
}

.emoji-btn:hover { background: var(--bg4); border-color: var(--border2); transform: scale(1.05); }

/* ── EMOJI PICKER ── */
.emoji-picker {
  position: absolute; bottom: 80px; right: 20px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px;
  display: none; z-index: 100;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: dropIn 0.2s ease;
}

.emoji-picker.visible { display: block; }

.emoji-grid {
  display: grid; grid-template-columns: repeat(8, 1fr);
  gap: 4px;
}

.ep-emoji {
  width: 36px; height: 36px; border-radius: 8px;
  background: transparent; border: none;
  font-size: 20px; cursor: pointer;
  transition: var(--trans); display: flex;
  align-items: center; justify-content: center;
}

.ep-emoji:hover { background: var(--bg4); transform: scale(1.2); }

/* ── MODALS ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  display: none;
}

.modal-overlay.visible { display: flex; animation: fadeIn 0.2s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 24px; padding: 28px;
  width: 480px; max-width: 95vw;
  max-height: 80vh; overflow-y: auto;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal h2 {
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 20px; margin-bottom: 20px;
}

.modal-close {
  position: absolute; top: -8px; right: -8px;
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg4); border: none;
  color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--trans);
}

.modal-close:hover { background: var(--danger); color: white; }
.modal-header { position: relative; }

/* ── PROFILE MODAL ── */
.profile-modal-avatar {
  width: 80px; height: 80px; border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin: 0 auto 16px;
  position: relative; cursor: pointer;
}

.avatar-picker {
  margin: 12px 0;
}

.avatar-emoji-grid {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin: 8px 0;
}

.av-emoji {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--bg3); border: 2px solid transparent;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--trans);
}

.av-emoji:hover, .av-emoji.selected { border-color: var(--accent3); background: var(--bg4); }

.color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }

.color-swatch {
  width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent;
  transition: var(--trans);
}

.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: white; }

/* ── NOTIFICATION TOAST ── */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 9999; display: flex; flex-direction: column; gap: 8px;
}

.toast {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 16px;
  min-width: 280px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(100%); }
  to   { opacity: 1; transform: translateX(0); }
}

.toast.out {
  animation: toastOut 0.3s ease forwards;
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(100%); }
}

.toast-icon { font-size: 20px; }
.toast-body { flex: 1; }
.toast-title { font-weight: 600; font-size: 13px; }
.toast-msg { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── MISC ── */
.divider { height: 1px; background: var(--border); margin: 12px 0; }

.tag {
  font-size: 11px; padding: 2px 8px;
  border-radius: 99px; background: var(--bg4);
  color: var(--text2); border: 1px solid var(--border);
}

.loading-dots {
  display: inline-flex; gap: 4px;
}

.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent3);
  animation: typingDot 1s infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.15s; }
.loading-dots span:nth-child(3) { animation-delay: 0.3s; }

/* Emoji reaction picker overlay */
.react-picker {
  position: absolute; z-index: 200;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 12px; padding: 8px;
  display: flex; gap: 4px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  animation: dropIn 0.15s ease;
}

.react-picker .rp-emoji {
  width: 32px; height: 32px; border-radius: 8px;
  background: transparent; border: none;
  font-size: 18px; cursor: pointer;
  transition: var(--trans); display: flex;
  align-items: center; justify-content: center;
}

.react-picker .rp-emoji:hover { background: var(--bg4); transform: scale(1.3); }

/* new group btn */
.new-group-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; margin: 0 8px 4px;
  border-radius: var(--radius-sm);
  color: var(--accent3); cursor: pointer;
  font-size: 13px; font-weight: 500;
  transition: var(--trans); border: none;
  background: transparent; width: calc(100% - 16px);
}

.new-group-btn:hover { background: var(--bg3); }

/* Member chip */
.member-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  background: var(--bg3); margin-bottom: 6px;
  cursor: pointer; transition: var(--trans);
  border: 1px solid var(--border);
}

.member-chip:hover { border-color: var(--accent3); }
.member-chip.selected { border-color: var(--accent3); background: rgba(109,40,217,0.1); }

.check-mark {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border2); margin-left: auto;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent; transition: var(--trans);
}

.member-chip.selected .check-mark {
  background: var(--accent2); border-color: var(--accent2);
  color: white;
}

/* Images in messages */
.msg-image {
  max-width: 280px; border-radius: 12px;
  cursor: pointer; transition: var(--trans);
}

.msg-image:hover { opacity: 0.9; transform: scale(1.01); }

/* Skeleton loader */
.skel { background: var(--bg4); border-radius: 6px; animation: skel 1.5s ease-in-out infinite alternate; }

@keyframes skel {
  from { opacity: 0.5; }
  to   { opacity: 1; }
}

/* Highlight unread */
@keyframes highlightMsg {
  0%, 100% { background: transparent; }
  50% { background: rgba(109,40,217,0.12); }
}

.highlight { animation: highlightMsg 1s ease; border-radius: 8px; }

/* Mobile menu toggle */
.mobile-back {
  display: none; padding: 6px; margin-right: 4px;
  background: transparent; border: none;
  color: var(--text2); font-size: 20px; cursor: pointer;
}

@media (max-width: 700px) {
  .sidebar { position: absolute; z-index: 50; width: 100%; }
  .sidebar.hidden { display: none; }
  .main { width: 100%; }
  .mobile-back { display: flex; align-items: center; }
}
</style>
</head>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let currentUser = null;
let socket = null;
let currentChat = null;
let chats = {};
let messages = {}; // chat_id -> []
let replyTo = null;
let typingTimeout = null;
let isTyping = false;
let selectedGroupMembers = [];
let profileEmoji = '👤';
let profileColor = '#7c3aed';

const EMOJIS = ['😀','😂','😍','🤔','😎','🥳','😭','🤯','👍','❤️','🔥','💎','⚡','🚀','🎯','✨','🌟','💫','🎉','🤝','😊','😈','👻','🦊','🐉','🌈','🍕','🎮','🏆','💡','🔑','⚔️','🛡️','🌙','☀️','🌊','🌺','🦋','🎵','🎸'];
const REACT_EMOJIS = ['👍','❤️','😂','😮','😢','😡','🔥','⚡'];
const COLORS = ['#7c3aed','#db2777','#059669','#d97706','#2563eb','#dc2626','#0891b2','#065f46','#92400e','#1e3a8a'];
const AV_EMOJIS = ['😎','🚀','🌟','🔥','⚡','🎯','💎','🌈','🦊','🐉','👑','🎭','🦁','🐺','🦄','🤖','👾','🎃','🌸','💀'];

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await api('/api/auth/me');
    if (res.user) {
      currentUser = res.user;
      showApp();
    }
  } catch(e) { /* not logged in */ }

  buildEmojiGrid();
  buildAvatarPicker();

  // Enter key for auth
  document.querySelectorAll('#login-form input, #register-form input').forEach(inp => {
    inp.addEventListener('keydown', e => { if(e.key === 'Enter') { e.target.closest('#login-form') ? doLogin() : doRegister(); } });
  });
}

// ─── API HELPER ───────────────────────────────────────────────────────────────
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw { status: res.status, message: data.error || 'Error' };
  return data;
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login') ? i===0 : i===1));
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true; btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const data = await api('/api/auth/login', 'POST', {
      email: document.getElementById('l-email').value,
      password: document.getElementById('l-pass').value,
    });
    currentUser = data.user;
    showApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

async function doRegister() {
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';
  btn.disabled = true; btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const data = await api('/api/auth/register', 'POST', {
      display_name: document.getElementById('r-name').value,
      username: document.getElementById('r-uname').value,
      email: document.getElementById('r-email').value,
      password: document.getElementById('r-pass').value,
    });
    currentUser = data.user;
    showApp();
  } catch(e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
}

async function doLogout() {
  await api('/api/auth/logout', 'POST');
  if (socket) socket.disconnect();
  currentUser = null; currentChat = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  closeModal('profile-modal');
}

// ─── SHOW APP ─────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  const appEl = document.getElementById('app');
  appEl.style.display = 'flex';
  appEl.classList.add('visible');

  // Update profile bar
  updateProfileBar();

  // Connect socket
  connectSocket();

  // Load chats
  loadChats();
}

function updateProfileBar() {
  if (!currentUser) return;
  const av = document.getElementById('profile-bar-avatar');
  av.style.background = currentUser.avatar_color;
  av.textContent = currentUser.avatar_emoji;
  document.getElementById('profile-bar-name').textContent = currentUser.display_name;
  document.getElementById('profile-bar-uname').textContent = '@' + currentUser.username;
}

// ─── SOCKET ───────────────────────────────────────────────────────────────────
function connectSocket() {
  socket = io({ transports: ['websocket', 'polling'] });

  socket.on('connect', () => console.log('Socket connected'));
  socket.on('disconnect', () => console.log('Socket disconnected'));

  socket.on('new_message', (msg) => {
    if (!messages[msg.chat_id]) messages[msg.chat_id] = [];
    messages[msg.chat_id].push(msg);

    if (currentChat && currentChat.id === msg.chat_id) {
      renderMessage(msg);
      scrollBottom();
    }

    // Update chat preview
    updateChatPreview(msg);

    // Toast if not current chat
    if (!currentChat || currentChat.id !== msg.chat_id) {
      const chat = Object.values(chats).find(c => c.id === msg.chat_id);
      const chatName = chat ? chat.name : 'Someone';
      toast(`💬 ${chatName}`, msg.sender.display_name + ': ' + msg.content.slice(0,60));
    }
  });

  socket.on('message_edited', (msg) => {
    const el = document.querySelector(`[data-msg-id="${msg.id}"]`);
    if (el) {
      const bubble = el.querySelector('.bubble-text');
      if (bubble) { bubble.textContent = msg.content; }
      const edited = el.querySelector('.msg-edited');
      if (edited) edited.style.display = 'inline';
    }
    if (messages[msg.chat_id]) {
      const idx = messages[msg.chat_id].findIndex(m => m.id === msg.id);
      if (idx !== -1) messages[msg.chat_id][idx] = msg;
    }
  });

  socket.on('message_deleted', (data) => {
    const el = document.querySelector(`[data-msg-id="${data.message_id}"]`);
    if (el) {
      const bubble = el.querySelector('.bubble-text');
      if (bubble) { bubble.textContent = '🗑 Message deleted'; bubble.style.opacity = '0.5'; }
    }
  });

  socket.on('reaction_updated', (msg) => {
    const el = document.querySelector(`[data-msg-id="${msg.id}"]`);
    if (el) {
      let reactWrap = el.querySelector('.msg-reactions');
      if (!reactWrap) { reactWrap = document.createElement('div'); reactWrap.className = 'msg-reactions'; el.querySelector('.message-bubble').appendChild(reactWrap); }
      reactWrap.innerHTML = renderReactions(msg.reactions, msg.id);
    }
  });

  socket.on('user_typing', (data) => {
    if (!currentChat || currentChat.id !== data.chat_id) return;
    const ti = document.getElementById('typing-indicator');
    const tt = document.getElementById('typing-text');
    if (data.typing) {
      ti.style.display = 'flex';
      tt.textContent = `${data.username} is typing...`;
    } else {
      ti.style.display = 'none';
    }
  });

  socket.on('user_online', (data) => { updateUserStatus(data.user_id, true); });
  socket.on('user_offline', (data) => { updateUserStatus(data.user_id, false); });
}

// ─── CHATS ────────────────────────────────────────────────────────────────────
async function loadChats() {
  try {
    const data = await api('/api/chats');
    chats = {};
    data.chats.forEach(c => chats[c.id] = c);
    renderChatList();
  } catch(e) { toast('⚠️ Failed to load chats', e.message || '', 'error'); }
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  const sorted = Object.values(chats).sort((a,b) => {
    const ta = a.last_message ? a.last_message.created_at : '0';
    const tb = b.last_message ? b.last_message.created_at : '0';
    return tb.localeCompare(ta);
  });

  if (!sorted.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">
      No chats yet. Search for someone above! 🔍</div>`;
    return;
  }

  list.innerHTML = sorted.map(c => chatItemHTML(c)).join('');
}

function chatItemHTML(chat) {
  const isActive = currentChat && currentChat.id === chat.id;
  const onlineClass = chat.online ? 'online' : '';
  const preview = chat.last_message
    ? `${chat.last_message.deleted ? '🗑 Deleted' : chat.last_message.content}`.slice(0, 40)
    : 'No messages yet';
  const time = chat.last_message ? formatTime(chat.last_message.created_at) : '';

  return `<div class="chat-item${isActive ? ' active' : ''}" onclick="openChat(${chat.id})" id="chat-item-${chat.id}">
    <div class="avatar ${onlineClass}" style="background:${chat.avatar_color}">
      ${chat.avatar_emoji}
      <span class="online-dot"></span>
    </div>
    <div class="chat-info">
      <div class="chat-name">${escHtml(chat.name)}</div>
      <div class="chat-preview">${escHtml(preview)}</div>
    </div>
    <div class="chat-meta">
      <div class="chat-time">${time}</div>
    </div>
  </div>`;
}

async function openChat(chatId) {
  const chat = chats[chatId];
  if (!chat) return;

  currentChat = chat;

  // Mobile: hide sidebar
  if (window.innerWidth <= 700) {
    document.getElementById('sidebar').classList.add('hidden');
  }

  // Update header
  const chAvatar = document.getElementById('ch-avatar');
  chAvatar.style.background = chat.avatar_color;
  chAvatar.textContent = chat.avatar_emoji;
  chAvatar.className = `avatar${chat.online ? ' online' : ''}`;
  document.getElementById('ch-name').textContent = chat.name;
  const statusEl = document.getElementById('ch-status');
  statusEl.textContent = chat.online ? '🟢 Online' : 'Offline';
  statusEl.className = 'status' + (chat.online ? ' online' : '');

  // Mark active
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`chat-item-${chatId}`);
  if (item) item.classList.add('active');

  // Show chat view
  document.getElementById('empty-state').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';
  cv.style.flexDirection = 'column';

  // Join room
  if (socket) socket.emit('join_chat', { chat_id: chatId });

  // Load messages
  const wrap = document.getElementById('messages-wrap');
  wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--text3)">
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>`;

  try {
    const data = await api(`/api/chats/${chatId}/messages`);
    messages[chatId] = data.messages;
    renderMessages(chatId);
    scrollBottom(true);
  } catch(e) {
    wrap.innerHTML = `<div style="text-align:center;color:var(--text3);padding:20px">Failed to load messages</div>`;
  }
}

function renderMessages(chatId) {
  const wrap = document.getElementById('messages-wrap');
  wrap.innerHTML = '';
  const msgs = messages[chatId] || [];
  if (!msgs.length) {
    wrap.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px">No messages yet. Say hi! 👋</div>`;
    return;
  }

  let lastDate = null;
  msgs.forEach(msg => {
    const msgDate = new Date(msg.created_at).toDateString();
    if (msgDate !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${formatDate(msg.created_at)}</span>`;
      wrap.appendChild(div);
      lastDate = msgDate;
    }
    renderMessage(msg, wrap);
  });
}

function renderMessage(msg, wrap = null) {
  if (!wrap) wrap = document.getElementById('messages-wrap');
  const isOwn = msg.sender.id === currentUser.id;

  // Check reply
  let replyHTML = '';
  if (msg.reply_to) {
    const parent = (messages[msg.chat_id] || []).find(m => m.id === msg.reply_to);
    if (parent) {
      replyHTML = `<div class="reply-preview">↩ <b>${escHtml(parent.sender.display_name)}</b>: ${escHtml(parent.content.slice(0,60))}</div>`;
    }
  }

  const row = document.createElement('div');
  row.className = `message-row${isOwn ? ' own' : ''}`;
  row.setAttribute('data-msg-id', msg.id);

  const isGroup = currentChat && currentChat.is_group;
  const avatarHTML = !isOwn ? `<div class="msg-avatar" style="background:${msg.sender.avatar_color}">${msg.sender.avatar_emoji}</div>` : '';

  const senderHTML = !isOwn && isGroup ? `<div class="msg-sender">${escHtml(msg.sender.display_name)}</div>` : '';

  row.innerHTML = `
    ${avatarHTML}
    <div class="message-group">
      ${senderHTML}
      <div class="message-bubble" oncontextmenu="showMsgMenu(event,${msg.id},${isOwn})">
        ${replyHTML}
        <div class="bubble-text${msg.deleted ? '" style="opacity:.5' : ''}">${escHtml(msg.content)}</div>
        <div class="msg-meta">
          ${msg.edited && !msg.deleted ? '<span class="msg-edited" style="opacity:.7;font-size:10px">edited</span>' : ''}
          <span>${formatTime(msg.created_at)}</span>
          ${isOwn ? '<span>✓✓</span>' : ''}
        </div>
        <div class="msg-reactions">${renderReactions(msg.reactions, msg.id)}</div>
        <div class="msg-ctx">
          <button class="ctx-btn" title="React" onclick="showReactPicker(event,${msg.id})">😊</button>
          <button class="ctx-btn" title="Reply" onclick="setReply(${msg.id})">↩</button>
          ${isOwn ? `<button class="ctx-btn" title="Edit" onclick="editMessage(${msg.id})">✏️</button>` : ''}
          ${isOwn ? `<button class="ctx-btn" title="Delete" onclick="deleteMessage(${msg.id})">🗑</button>` : ''}
        </div>
      </div>
    </div>
    ${!avatarHTML ? '<div style="width:32px"></div>' : ''}
  `;

  wrap.appendChild(row);
}

function renderReactions(reactions, msgId) {
  if (!reactions || !Object.keys(reactions).length) return '';
  return Object.entries(reactions).map(([emoji, users]) => {
    const isMine = users.includes(currentUser.id);
    return `<span class="reaction-chip${isMine ? ' mine' : ''}" onclick="reactMessage(${msgId},'${emoji}')">
      ${emoji} <span class="reaction-count">${users.length}</span>
    </span>`;
  }).join('');
}

function updateChatPreview(msg) {
  const chat = chats[msg.chat_id];
  if (!chat) { loadChats(); return; }
  chat.last_message = msg;
  const item = document.getElementById(`chat-item-${msg.chat_id}`);
  if (item) {
    item.querySelector('.chat-preview').textContent = msg.content.slice(0,40);
    item.querySelector('.chat-time').textContent = formatTime(msg.created_at);
  }
  // Move to top
  const list = document.getElementById('chat-list');
  list.prepend(item);
}

function updateUserStatus(userId, online) {
  // Find DM chat with this user and update
  Object.values(chats).forEach(chat => {
    if (!chat.is_group) {
      const other = chat.members.find(m => m.id === userId);
      if (other) {
        chat.online = online;
        const item = document.getElementById(`chat-item-${chat.id}`);
        if (item) {
          const dot = item.querySelector('.online-dot');
          if (dot) dot.style.display = online ? 'block' : 'none';
          const av = item.querySelector('.avatar');
          if (av) av.classList.toggle('online', online);
        }
        if (currentChat && currentChat.id === chat.id) {
          const statusEl = document.getElementById('ch-status');
          statusEl.textContent = online ? '🟢 Online' : 'Offline';
          statusEl.className = 'status' + (online ? ' online' : '');
        }
      }
    }
  });
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
function sendMessage() {
  if (!currentChat || !socket) return;
  const inp = document.getElementById('msg-input');
  const content = inp.value.trim();
  if (!content) return;

  socket.emit('send_message', {
    chat_id: currentChat.id,
    content,
    reply_to: replyTo ? replyTo.id : null,
  });

  inp.value = ''; inp.style.height = '';
  clearReply();
  stopTyping();
}

function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function onInputChange(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  sendTyping(true);
}

function sendTyping(val) {
  if (!currentChat || !socket) return;
  if (val && !isTyping) {
    isTyping = true;
    socket.emit('typing', { chat_id: currentChat.id, typing: true });
  }
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(stopTyping, 2000);
}

function stopTyping() {
  if (isTyping && socket && currentChat) {
    isTyping = false;
    socket.emit('typing', { chat_id: currentChat.id, typing: false });
  }
}

// ─── REPLY ────────────────────────────────────────────────────────────────────
function setReply(msgId) {
  const msgs = messages[currentChat.id] || [];
  const msg = msgs.find(m => m.id === msgId);
  if (!msg) return;
  replyTo = msg;
  const bar = document.getElementById('reply-bar');
  bar.classList.add('visible');
  document.getElementById('reply-preview-text').textContent = `${msg.sender.display_name}: ${msg.content.slice(0,60)}`;
  document.getElementById('msg-input').focus();
}

function clearReply() {
  replyTo = null;
  document.getElementById('reply-bar').classList.remove('visible');
}

// ─── EDIT / DELETE ────────────────────────────────────────────────────────────
function editMessage(msgId) {
  const msgs = messages[currentChat.id] || [];
  const msg = msgs.find(m => m.id === msgId);
  if (!msg) return;
  const newContent = prompt('Edit message:', msg.content);
  if (newContent && newContent.trim() && newContent.trim() !== msg.content) {
    socket.emit('edit_message', { message_id: msgId, content: newContent.trim() });
  }
}

function deleteMessage(msgId) {
  if (!confirm('Delete this message?')) return;
  socket.emit('delete_message', { message_id: msgId });
}

// ─── REACTIONS ────────────────────────────────────────────────────────────────
function reactMessage(msgId, emoji) {
  if (!socket) return;
  socket.emit('react_message', { message_id: msgId, emoji });
}

function showReactPicker(e, msgId) {
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.react-picker').forEach(p => p.remove());
  const picker = document.createElement('div');
  picker.className = 'react-picker';
  picker.innerHTML = REACT_EMOJIS.map(em =>
    `<button class="rp-emoji" onclick="reactMessage(${msgId},'${em}');this.closest('.react-picker').remove()">${em}</button>`
  ).join('');
  document.body.appendChild(picker);
  picker.style.position = 'fixed';
  picker.style.left = Math.min(e.clientX, window.innerWidth - 300) + 'px';
  picker.style.top = (e.clientY - 50) + 'px';
  setTimeout(() => document.addEventListener('click', () => picker.remove(), {once:true}), 50);
}

function showMsgMenu(e, msgId, isOwn) {
  e.preventDefault();
  // Context menu handled by hover buttons now, could expand here
}

// ─── EMOJI PICKER ─────────────────────────────────────────────────────────────
function buildEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = EMOJIS.map(em =>
    `<button class="ep-emoji" onclick="insertEmoji('${em}')">${em}</button>`
  ).join('');
}

function toggleEmojiPicker() {
  const ep = document.getElementById('emoji-picker');
  ep.classList.toggle('visible');
}

function insertEmoji(em) {
  const inp = document.getElementById('msg-input');
  inp.value += em; inp.focus();
  document.getElementById('emoji-picker').classList.remove('visible');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-btn') && !e.target.closest('.emoji-picker')) {
    document.getElementById('emoji-picker')?.classList.remove('visible');
  }
});

// ─── SEARCH ───────────────────────────────────────────────────────────────────
let searchTimer = null;

function onSearch(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) { hideSearchResults(); return; }
  searchTimer = setTimeout(() => doSearch(q), 300);
}

async function doSearch(q) {
  try {
    const data = await api(`/api/users/search?q=${encodeURIComponent(q)}`);
    showSearchResults(data.users);
  } catch(e) {}
}

function showSearchResults(users) {
  const el = document.getElementById('search-results');
  if (!users.length) { el.innerHTML = `<div style="padding:12px;text-align:center;color:var(--text3);font-size:13px">No users found</div>`; el.classList.add('visible'); return; }
  el.innerHTML = users.map(u => `
    <div class="search-result-item" onclick="startDM(${u.id})">
      <div class="avatar" style="background:${u.avatar_color};width:36px;height:36px;font-size:16px">${u.avatar_emoji}</div>
      <div>
        <div style="font-weight:600;font-size:13px">${escHtml(u.display_name)}</div>
        <div style="font-size:11px;color:var(--text2)">@${escHtml(u.username)}</div>
      </div>
    </div>
  `).join('');
  el.classList.add('visible');
}

function hideSearchResults() {
  document.getElementById('search-results').classList.remove('visible');
}

function onSearchFocus() { if (document.getElementById('search-input').value) hideSearchResults(); }
function onSearchBlur() { setTimeout(hideSearchResults, 200); }

async function startDM(userId) {
  hideSearchResults();
  document.getElementById('search-input').value = '';
  try {
    const data = await api(`/api/chats/dm/${userId}`, 'POST');
    const chat = data.chat;
    chats[chat.id] = chat;
    renderChatList();
    openChat(chat.id);
  } catch(e) { toast('⚠️ Error', e.message, 'error'); }
}

// ─── GROUP ────────────────────────────────────────────────────────────────────
function openGroupModal() {
  selectedGroupMembers = [];
  document.getElementById('gm-name').value = '';
  document.getElementById('gm-search').value = '';
  document.getElementById('gm-results').innerHTML = '';
  document.getElementById('gm-selected').innerHTML = '';
  openModal('group-modal');
}

let gmTimer = null;
async function searchGroupMembers(q) {
  clearTimeout(gmTimer);
  if (!q.trim()) { document.getElementById('gm-results').innerHTML = ''; return; }
  gmTimer = setTimeout(async () => {
    const data = await api(`/api/users/search?q=${encodeURIComponent(q)}`);
    const el = document.getElementById('gm-results');
    el.innerHTML = data.users.map(u => {
      const sel = selectedGroupMembers.find(m => m.id === u.id);
      return `<div class="member-chip${sel ? ' selected' : ''}" onclick="toggleGroupMember(${JSON.stringify(u).replace(/"/g,'&quot;')})">
        <div class="avatar" style="background:${u.avatar_color};width:32px;height:32px;font-size:14px">${u.avatar_emoji}</div>
        <div>
          <div style="font-weight:600;font-size:13px">${escHtml(u.display_name)}</div>
          <div style="font-size:11px;color:var(--text2)">@${escHtml(u.username)}</div>
        </div>
        <div class="check-mark">${sel ? '✓' : ''}</div>
      </div>`;
    }).join('');
  }, 300);
}

function toggleGroupMember(user) {
  if (typeof user === 'string') user = JSON.parse(user);
  const idx = selectedGroupMembers.findIndex(m => m.id === user.id);
  if (idx === -1) selectedGroupMembers.push(user);
  else selectedGroupMembers.splice(idx, 1);
  renderSelectedMembers();
  searchGroupMembers(document.getElementById('gm-search').value);
}

function renderSelectedMembers() {
  const el = document.getElementById('gm-selected');
  el.innerHTML = selectedGroupMembers.map(u =>
    `<div style="display:flex;align-items:center;gap:6px;background:var(--bg4);border-radius:99px;padding:4px 10px 4px 6px;font-size:13px">
      <span>${u.avatar_emoji}</span>
      <span>${escHtml(u.display_name)}</span>
      <span onclick="toggleGroupMember(${JSON.stringify(u).replace(/"/g,'&quot;')})" style="cursor:pointer;color:var(--text3);margin-left:4px">✕</span>
    </div>`
  ).join('');
}

async function createGroup() {
  const name = document.getElementById('gm-name').value.trim();
  if (!name) { toast('⚠️', 'Group name required', 'error'); return; }
  try {
    const data = await api('/api/chats/group', 'POST', {
      name, member_ids: selectedGroupMembers.map(m => m.id)
    });
    chats[data.chat.id] = data.chat;
    renderChatList();
    closeModal('group-modal');
    openChat(data.chat.id);
    toast('👥 Group created!', name);
  } catch(e) { toast('⚠️ Error', e.message, 'error'); }
}

// ─── PROFILE ─────────────────────────────────────────────────────────────────
function buildAvatarPicker() {
  // Emojis
  const eg = document.getElementById('avatar-emoji-grid');
  eg.innerHTML = AV_EMOJIS.map(em =>
    `<div class="av-emoji" onclick="selectAvatarEmoji('${em}')">${em}</div>`
  ).join('');

  // Colors
  const cg = document.getElementById('color-grid');
  cg.innerHTML = COLORS.map(c =>
    `<div class="color-swatch" style="background:${c}" onclick="selectAvatarColor('${c}')"></div>`
  ).join('');
}

function selectAvatarEmoji(em) {
  profileEmoji = em;
  document.querySelectorAll('.av-emoji').forEach(el => el.classList.toggle('selected', el.textContent === em));
  document.getElementById('pm-avatar').textContent = em;
}

function selectAvatarColor(c) {
  profileColor = c;
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.toggle('selected', el.style.background === c));
  document.getElementById('pm-avatar').style.background = c;
}

function openProfileModal() {
  if (!currentUser) return;
  profileEmoji = currentUser.avatar_emoji;
  profileColor = currentUser.avatar_color;
  document.getElementById('pm-avatar').textContent = profileEmoji;
  document.getElementById('pm-avatar').style.background = profileColor;
  document.getElementById('pm-display-name').value = currentUser.display_name;
  document.getElementById('pm-bio').value = currentUser.bio || '';

  // Mark selected
  document.querySelectorAll('.av-emoji').forEach(el => el.classList.toggle('selected', el.textContent === profileEmoji));
  document.querySelectorAll('.color-swatch').forEach(el => el.classList.toggle('selected', el.style.background === profileColor || el.style.backgroundColor === profileColor));

  openModal('profile-modal');
}

async function saveProfile() {
  try {
    const data = await api('/api/users/profile', 'PUT', {
      display_name: document.getElementById('pm-display-name').value,
      bio: document.getElementById('pm-bio').value,
      avatar_emoji: profileEmoji,
      avatar_color: profileColor,
    });
    currentUser = data.user;
    updateProfileBar();
    closeModal('profile-modal');
    toast('✅ Profile updated!', 'Changes saved');
  } catch(e) { toast('⚠️ Error', e.message, 'error'); }
}

// ─── CHAT INFO ────────────────────────────────────────────────────────────────
function openChatInfo() {
  if (!currentChat) return;
  const el = document.getElementById('chat-info-content');
  const members = currentChat.members || [];
  el.innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div class="avatar" style="background:${currentChat.avatar_color};width:64px;height:64px;font-size:28px;margin:0 auto 12px">${currentChat.avatar_emoji}</div>
      <h3 style="font-family:'Syne',sans-serif">${escHtml(currentChat.name)}</h3>
      ${currentChat.is_group ? `<span class="tag">Group · ${members.length} members</span>` : ''}
    </div>
    ${currentChat.is_group ? `<div><label style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">Members</label>
    ${members.map(m => `<div class="member-chip" style="cursor:default">
      <div class="avatar" style="background:${m.avatar_color};width:32px;height:32px;font-size:14px">${m.avatar_emoji}</div>
      <div><div style="font-weight:600;font-size:13px">${escHtml(m.display_name)}</div><div style="font-size:11px;color:var(--text2)">@${escHtml(m.username)}</div></div>
      ${m.online ? '<span style="color:var(--online);font-size:11px;margin-left:auto">● Online</span>' : ''}
    </div>`).join('')}</div>` : ''}
  `;
  openModal('chat-info-modal');
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('visible');
  document.getElementById(id).style.display = 'flex';
}

function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('visible');
  el.style.display = 'none';
}

document.addEventListener('click', e => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('visible');
    e.target.style.display = 'none';
  }
});

// ─── MOBILE ───────────────────────────────────────────────────────────────────
function showSidebar() {
  document.getElementById('sidebar').classList.remove('hidden');
  currentChat = null;
  document.getElementById('empty-state').style.display = '';
  document.getElementById('chat-view').style.display = 'none';
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(title, msg = '', type = 'info') {
  const icons = { info: '💬', error: '⚠️', success: '✅' };
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `
    <div class="toast-icon">${icons[type] || '💬'}</div>
    <div class="toast-body">
      <div class="toast-title">${title}</div>
      ${msg ? `<div class="toast-msg">${escHtml(String(msg).slice(0,80))}</div>` : ''}
    </div>
  `;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 4000);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str || ''));
  return div.innerHTML;
}

function scrollBottom(instant = false) {
  const wrap = document.getElementById('messages-wrap');
  if (instant) wrap.scrollTop = wrap.scrollHeight;
  else wrap.scrollTo({ top: wrap.scrollHeight, behavior: 'smooth' });
}

function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
init();
</script>
